<!DOCTYPE html>
<html lang="en">
  <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Stephi Rundall's Page</title>
      <link rel="stylesheet" type="text/css" href="styles.css">
    <style>
      body {
        font-family: 'Courier New', Courier, monospace;
        margin: 0;
      }
      h1, h2, p {
        font-family: 'Courier New', Courier, monospace;
      }
      nav {
        color: hotpink;
        font-weight: bold;
        text-decoration: none;
      }
      nav ul {
        display: flex;
        justify-content: space-around;
        list-style: none;
        padding: 0;
      }
      .center-image {
        width: 100%;
        height: auto;
      }
    </style>
  </head>

  <body>

      <header>
          <div class="header-inner">
            <h1 class="brand">
              Stephi Rundall's Page<span class="dot">.</span>
            </h1>
          </div>
          <nav>
          <ul>
              <li><a href="#home">Home</a></li>
              <li><a href="#about">About</a></li>
              <li><a href="#services">Hobbies</a></li>
              <li><a href="#contact">Contact</a></li>
            </ul>
          </nav>
      </header>

      <section class ="hero">
        <div class="hero-content">
          <h1>Welcome!</h1> 
        <p class="hero-subhead">
          I am so excited that you're here.
        </p>
          <a href="#about" class="btn btn-dark">Get Started</a>
        </div>
      </section>
 
      <section>
        <img src="Images/Hero.jpg" alt="Hero Image" class="center-image">
      </section>

      <section>
        <img src="Images/blurbs.jpg" alt="Blurb Image" class="center-image">
      </section>

      <section>
        <img src="Images/Featured.jpg" alt="Featured Image" class="center-image">
      </section>

      <section>
        <div class="card-image"
        style="background-image: url(https://images.unsplash.com/photo-1469474968028-56623f02e42e?auto=format&fit=crop&w=800&q=60);"></div>
      </div>

        <img src="Images/Secondary.jpg" alt="Secondary Image" class="center-image">
        <br><br>
        <div class="cta-inner">
        <a href="https://www.instagram.com/stephi.15?igsh=bTM0bDU3YjBvbHI2&utm_source=qr" 
            class="btn secondary">
        Heard enough?
        </div>
      </a>
      </section>
    <section class="secondary">
      <div class="secondary-grid"
      <div class="card">
        <div class="card-text">
          <h3>Check out my Instagram above</h3>
          <p>
            I upload pictures with my friends, places I travel to, and more!
          </p>
        </div>
      </div>
      <div class="card">
        <div class="card-text"></div>
      </div>
    </section>
    <footer>
      <img src="Images/Footer.jpg" alt="Footer Image" class="center-image">
      <div class="footer-inner">
        <div class="footer-left">
          <p>© 2026 Stephi Rundall. All rights reserved.</p>
        </div>
      </div>
    </footer>

</body>
</html>
